<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mavridis Crystal Cola - Master Lab</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #eee; text-align: center; padding: 15px; }
        .container { background: #1e1e1e; padding: 20px; border-radius: 15px; max-width: 450px; margin: auto; border: 1px solid #00d4ff; }
        h2 { color: #00d4ff; font-size: 1.4rem; }
        .calc-section { background: #252525; padding: 15px; border-radius: 10px; margin: 15px 0; border-bottom: 3px solid #00d4ff; }
        input { width: 70%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #000; color: #00d4ff; font-size: 1.2rem; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
        th, td { padding: 10px; border-bottom: 1px solid #333; text-align: left; }
        .val { color: #00d4ff; font-weight: bold; text-align: right; }
        button { background: #00d4ff; color: #000; padding: 12px 25px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #app-screen { display: none; }
    </style>
</head>
<body>

<div id="login-screen" class="container">
    <h2>🔒 Mavridis Crystal Login</h2>
    <input type="password" id="pass" placeholder="Κωδικός">
    <br><button onclick="checkPass()">Είσοδος</button>
</div>

<div id="app-screen" class="container">
    <h2>💎 Crystal Cola Master Lab</h2>

    <div class="calc-section">
        <label>1. ΠΟΣΑ ΛΙΤΡΑ (L) ΣΟΔΑΣ ΘΑ ΦΤΙΑΞΕΙΣ;</label>
        <input type="number" id="sodaLiters" placeholder="π.χ. 5" oninput="calculate()">
        <p>Πρόσθεσε: <span id="aroma-needed" class="val" style="font-size:1.5rem">0</span> ml Αρώματος</p>
    </div>

    <div class="calc-section">
        <label>2. ΠΟΣΑ ΓΡΑΜΜΑΡΙΑ (g) ΒΑΣΗΣ ΘΕΛΕΙΣ ΝΑ ΦΤΙΑΞΕΙΣ;</label>
        <input type="number" id="baseGrams" value="1000" oninput="calculate()">
        <p style="font-size:0.8rem; color:#888;">(Αυτό υπολογίζει τις ουσίες μέσα στην αλκοόλη)</p>
    </div>

    <table>
        <thead>
            <tr style="color:#00d4ff"><th>Αρωματική Ουσία</th><th style="text-align:right">Γραμμάρια (g)</th></tr>
        </thead>
        <tbody id="recipe-table">
            </tbody>
    </table>
</div>

<script>
    // Αναλογίες ουσιών για 4g Master Blend (που αντιστοιχούν σε 1kg αλκοόλης)
    // Τα νούμερα είναι προσαρμοσμένα ώστε το άθροισμα να είναι 4g
    const recipe = [
        { name: "Citral", factor: 1.92 },
        { name: "Cinnamic Aldehyde", factor: 0.48 },
        { name: "Eugenol", factor: 0.32 },
        { name: "Vanillin (Booster)", factor: 0.20 },
        { name: "Ethyl Linalool", factor: 0.24 },
        { name: "Limonene", factor: 0.20 },
        { name: "Tea Tree Effect", factor: 0.56 },
        { name: "Methyl Anthranilate", factor: 0.04 },
        { name: "Fenchyl Alcohol", factor: 0.04 }
    ];

    function checkPass() {
        if(document.getElementById('pass').value === '1234') {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            calculate();
        } else { alert('Λάθος Κωδικός!'); }
    }

    function calculate() {
        // 1. Υπολογισμός δόσης για σόδα
        let liters = document.getElementById('sodaLiters').value || 0;
        document.getElementById('aroma-needed').innerText = (liters * 1).toFixed(1);

        // 2. Υπολογισμός ουσιών για τη βάση
        let baseGrams = document.getElementById('baseGrams').value || 0;
        let ratio = baseGrams / 1000; // Βάση με αναλογία 4g blend / 1kg αλκοόλ
        
        let tableHTML = "";
        recipe.forEach(item => {
            let amount = (item.factor * ratio).toFixed(3);
            tableHTML += `<tr><td>${item.name}</td><td class="val">${amount}g</td></tr>`;
        });
        document.getElementById('recipe-table').innerHTML = tableHTML;
    }
</script>

</body>
</html>
